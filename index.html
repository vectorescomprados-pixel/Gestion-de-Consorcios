<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB - Gestión de Consorcios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b141a;
            --card: #111b21;
            --primary: #2563eb;
            --success: #22c55e;
            --danger: #e11d48;
            --text: #e9edef;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 🏠 BOTÓN CASITA */
        .btn-home {
            position: fixed; top: 15px; left: 15px; z-index: 9999;
            background: rgba(37, 99, 235, 0.9); color: white; border: none;
            border-radius: 50%; width: 45px; height: 45px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex;
            align-items: center; justify-content: center; text-decoration: none;
        }

        header {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
            background: var(--card);
            border-bottom: 2px solid var(--primary);
            border-radius: 0 0 20px 20px;
        }

        /* LEYENDA SEGURIDAD VERDE */
        #status-bar {
            color: var(--success);
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding-bottom: 100px;
        }

        .hub-card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid #222d34;
            transition: 0.3s;
        }

        .hub-card:active { transform: scale(0.95); background: #1a252c; }

        .hub-card i { font-size: 30px; margin-bottom: 10px; color: var(--primary); }
        .hub-card span { display: block; font-weight: bold; font-size: 14px; }

        /* MODAL Y LOGIN */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; border: 1px solid var(--primary); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2a3942; background: #1a252c; color: white; outline: none; }
        
        .btn { padding: 12px; width: 100%; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-ghost { background: #333; color: #ccc; }

        .hidden { display: none !important; }

        #btn-logout-main {
            position: fixed; bottom: 20px; width: 90%; max-width: 450px;
            background: var(--danger); color: white; font-weight: bold;
            padding: 15px; border-radius: 12px; border: none; cursor: pointer;
        }
    </style>
</head>
<body>

    <a href="#" class="btn-home"><i class="fas fa-home"></i></a>

    <div id="login-screen" class="modal">
        <div class="modal-content">
            <i class="fas fa-shield-alt" style="font-size: 40px; color: var(--primary); margin-bottom: 15px;"></i>
            <h2>Acceso al Hub</h2>
            <input type="text" id="user" placeholder="Usuario (Admin/Operador)">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn btn-primary" onclick="login()">INGRESAR AL PANEL</button>
        </div>
    </div>

    <div id="main-hub" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <header>
            <div id="status-bar">● SISTEMA CONECTADO - SEGURIDAD ACTIVA</div>
            <h1>HUB CENTRAL</h1>
            <p style="font-size: 12px; opacity: 0.6;">Gestión Integral de Consorcios</p>
        </header>

        <div class="container">
            <a href="https://tu-url-salon.github.io" class="hub-card">
                <i class="fas fa-calendar-alt"></i>
                <span>GESTIÓN SUM</span>
            </a>
            <a href="https://tu-url-cocheras.github.io" class="hub-card">
                <i class="fas fa-car"></i>
                <span>COCHERAS</span>
            </a>
            <a href="https://tu-url-reparaciones.github.io" class="hub-card">
                <i class="fas fa-tools"></i>
                <span>REPARACIONES</span>
            </a>
            <a href="https://tu-url-unidades.github.io" class="hub-card">
                <i class="fas fa-building"></i>
                <span>GESTIÓN UF</span>
            </a>
        </div>

        <button id="btn-logout-main" onclick="abrirCartelSalida()">CERRAR SESIÓN SEGURA</button>
    </div>

    <div id="modal-logout" class="modal hidden">
        <div class="modal-content">
            <i class="fas fa-sign-out-alt" style="font-size: 50px; color: var(--danger); margin-bottom: 15px;"></i>
            <h3 style="font-size: 20px;">Finalizar Sesión</h3>
            <p style="margin: 15px 0; font-size: 14px; opacity: 0.8;">¿Desea cerrar el sistema de gestión de forma segura?</p>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-danger" onclick="confirmarSalida()">SALIR</button>
                <button class="btn btn-ghost" onclick="cerrarCartelSalida()">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        // Tu clave guardada: 1131552679
        const MASTER_KEY = "1131552679";

        function login() {
            const p = document.getElementById("pass").value;
            if (p === MASTER_KEY) {
                localStorage.setItem("hub_auth", "true");
                mostrarHub();
            } else {
                alert("Clave administrativa incorrecta");
            }
        }

        function mostrarHub() {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-hub").classList.remove("hidden");
        }

        // Al cargar, verificar si ya estaba logueado
        if (localStorage.getItem("hub_auth") === "true") {
            mostrarHub();
        }

        // Lógica del cartel de salida
        function abrirCartelSalida() {
            document.getElementById("modal-logout").classList.remove("hidden");
        }

        function cerrarCartelSalida() {
            document.getElementById("modal-logout").classList.add("hidden");
        }

        function confirmarSalida() {
            localStorage.removeItem("hub_auth");
            location.reload();
        }
    </script>
</body>
</html>
