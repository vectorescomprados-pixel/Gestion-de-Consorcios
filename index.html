<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>HUB - Gestión de Consorcios</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b141a">
    
    <link rel="apple-touch-icon" href="icono.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b141a; --card: #111b21; --primary: #2563eb;
            --success: #22c55e; --danger: #e11d48; --text: #e9edef;
            --border: #2a3942; --warning: #f59e0b; --modal-bg: #182229;
            --label: #8696a0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        header { width: 100%; max-width: 500px; padding: 35px 15px; text-align: center; background: var(--card); border-bottom: 3px solid var(--primary); border-radius: 0 0 25px 25px; position: relative; }
        .btn-sync-hub { position: absolute; top: 25px; right: 20px; background: rgba(37, 99, 235, 0.15); color: var(--primary); border: 1px solid var(--primary); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .logo-container { position: absolute; top: 15px; left: 20px; background: var(--primary); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); overflow: hidden; }
        .edi-logo { width: 100%; height: 100%; object-fit: cover; }

        .console-container { width: 92%; max-width: 450px; margin-top: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .console-item { background: rgba(37, 99, 235, 0.08); border: 1px solid var(--border); padding: 18px 5px; border-radius: 20px; text-align: center; cursor: pointer; }
        .console-item b { font-size: 16px; display: block; color: #fff; }
        .console-item span { font-size: 9px; text-transform: uppercase; opacity: 0.5; }
        
        .container { width: 92%; max-width: 450px; margin-top: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding-bottom: 30px; }
        .hub-card { background: var(--card); padding: 30px 10px; border-radius: 25px; text-align: center; text-decoration: none; color: white; border: 1px solid var(--border); transition: 0.2s; }
        .hub-card:active { transform: scale(0.95); background: #1c272e; }
        .hub-card i { font-size: 30px; margin-bottom: 10px; color: var(--primary); display: block; }
        
        .hub-card-wide { grid-column: span 2; display: flex; align-items: center; justify-content: center; gap: 15px; padding: 20px; border-color: var(--warning); }
        .hub-card-wide i { margin: 0; font-size: 24px; color: var(--warning); }

        .logout-trigger { margin: 20px 0 50px 0; color: var(--danger); font-size: 12px; font-weight: bold; cursor: pointer; border: 1px solid var(--danger); padding: 12px 25px; border-radius: 15px; background: none; text-transform: uppercase; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 30px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #232d36; }
        
        /* Estilos específicos para las fichas de obra */
        .list-scroll { max-height: 400px; overflow-y: auto; margin-top: 15px; padding-right: 5px; }
        .ficha-registro { background: #1c272e; border: 1px solid #2a3942; border-radius: 15px; padding: 15px; margin-bottom: 12px; text-align: left; }
        .campo { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 3px; }
        .lbl { color: var(--label); font-size: 10px; text-transform: uppercase; font-weight: 800; min-width: 45px; }
        .val { color: #fff; font-size: 13px; font-weight: 600; flex: 1; }
        .val-tarea { color: var(--warning); font-size: 12px; font-weight: 500; line-height: 1.4; }

        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 1px solid var(--border); background: #000; color: white; text-align: center; font-size: 20px; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2>Gestión de Consorcios</h2>
            <input type="password" id="pass" placeholder="••••" inputmode="numeric">
            <button class="btn-main" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <div id="reparaciones-modal" class="modal hidden">
        <div class="modal-content">
            <h3 style="color: var(--primary); margin-bottom: 10px;">Fichas de Obra</h3>
            <div id="lista-reparaciones" class="list-scroll"></div>
            <button class="btn-main" style="background: #374151; margin-top: 15px;" onclick="cerrarObras()">VOLVER</button>
        </div>
    </div>

    <div id="logout-confirm" class="modal hidden">
        <div class="modal-content">
            <div style="color: #ef4444; font-size: 45px; margin-bottom: 15px;"><i class="fas fa-sign-out-alt"></i></div>
            <div style="font-size: 20px; font-weight: bold; margin-bottom: 10px;">Finalizar Sesión</div>
            <div style="font-size: 14px; color: #8696a0; margin-bottom: 25px;">¿Desea cerrar el sistema de forma segura?</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" style="background: #ea333f;" onclick="confirmarSalida()">SALIR</button>
                <button class="btn-main" style="background: #374151;" onclick="cerrarCartel()">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="main-hub" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <header>
            <div class="logo-container"><img src="edi.png" alt="Edificio" class="edi-logo"></div>
            <div class="btn-sync-hub" onclick="location.reload(true)"><i class="fas fa-sync-alt"></i></div>
            <h1 style="font-size: 18px; font-weight: 900; margin-left: 65px;">URQUIZA 4750</h1>
        </header>

        <div class="console-container">
            <div class="console-item"><i class="fas fa-car" style="color:var(--primary)"></i><b id="stat-cocheras">--</b><span>Libres</span></div>
            <div class="console-item"><i class="fas fa-calendar-check" style="color:var(--primary)"></i><b id="stat-sum">--</b><span>S.U.M.</span></div>
            <div id="btn-ver-reparaciones" class="console-item"><i class="fas fa-tools" style="color:var(--primary)"></i><b id="stat-obras">--</b><span>Obras</span></div>
        </div>

        <div class="container">
            <a href="https://vectorescomprados-pixel.github.io/reservas_salon/" class="hub-card"><i class="fas fa-calendar-alt"></i><span>RESERVAS</span></a>
            <a href="https://vectorescomprados-pixel.github.io/Gestion-de-cocheras/" class="hub-card"><i class="fas fa-parking"></i><span>COCHERA</span></a>
            <a href="https://vectorescomprados-pixel.github.io/Gestion-Integral-de-Reparaciones/" class="hub-card"><i class="fas fa-hammer"></i><span>OBRAS</span></a>
            <a href="https://vectorescomprados-pixel.github.io/GestionUF-Comercial/" class="hub-card"><i class="fas fa-users-cog"></i><span>UNIDADES</span></a>
            <a href="https://vectorescomprados-pixel.github.io/Sistema-de-Infracciones/" class="hub-card hub-card-wide"><i class="fas fa-exclamation-triangle"></i><span>GESTIÓN DE INFRACCIONES</span></a>
        </div>

        <button class="logout-trigger" onclick="abrirCartel()">Cerrar Sesión</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.error(err)); }); }

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let mapaDeptos = {};
        let listaReparaciones = [];

        function procesarFecha(f) {
            if(!f) return 0;
            let str = f.toString().replace(/\D/g, ''); 
            if (f.includes('-') && f.indexOf('-') === 4) return parseInt(str); 
            if (str.length === 6) return parseInt("20" + str.substring(4,6) + str.substring(2,4) + str.substring(0,2)); 
            return 0;
        }

        function iniciar() {
            // Escuchar departamentos para Cocheras y Mapa de Nombres
            onSnapshot(collection(db, "departamentos"), (snap) => {
                let libres = 0;
                snap.docs.forEach(d => {
                    const data = d.data();
                    mapaDeptos[d.id] = data;
                    const inq = data.Inquilino || data.inquilino || "";
                    const uf = parseInt(data.UF || data.uf || 0);
                    if (uf <= 87 && inq.toString().trim() === "") libres++;
                });
                document.getElementById("stat-cocheras").innerText = libres;
            });

            onSnapshot(collection(db, "reservas_salon"), (snap) => {
                const hoy = new Date();
                const hoyNum = parseInt(hoy.getFullYear() + String(hoy.getMonth()+1).padStart(2,'0') + String(hoy.getDate()).padStart(2,'0'));
                let masProxima = null; let minDif = 99999999;
                snap.forEach(doc => {
                    const d = doc.data(); const fOriginal = d.fecha || d.Fecha; const fNum = procesarFecha(fOriginal);
                    if (fNum >= hoyNum && fNum < minDif) { minDif = fNum; masProxima = fOriginal; }
                });
                const el = document.getElementById("stat-sum");
                if (masProxima) {
                    if (minDif === hoyNum) { el.innerText = "HOY"; el.style.color = "var(--danger)"; } 
                    else {
                        const c = masProxima.replace(/\D/g, '');
                        el.innerText = (masProxima.includes('-') && masProxima.indexOf('-') === 4) ? c.substring(6,8)+"/"+c.substring(4,6) : c.substring(0,2)+"/"+c.substring(2,4);
                        el.style.color = "var(--warning)";
                    }
                } else { el.innerText = "S/R"; el.style.color = "var(--success)"; }
            });

            // Escuchar reparaciones y activar clic en consola
            onSnapshot(collection(db, "reparaciones"), (snap) => {
                listaReparaciones = snap.docs
                    .filter(d => ["Pendiente", "En Proceso"].includes(d.data().estado || d.data().Estado))
                    .map(d => d.data());
                
                const p = listaReparaciones.length;
                const el = document.getElementById("stat-obras");
                el.innerText = p;
                el.style.color = p > 0 ? "var(--danger)" : "var(--success)";
            });

            // Lógica para abrir el modal al hacer clic en el círculo de Obras
            document.getElementById("btn-ver-reparaciones").onclick = () => {
                const listado = document.getElementById("lista-reparaciones");
                listado.innerHTML = "";
                listaReparaciones.forEach(rep => {
                    const depto = mapaDeptos[rep.id_uf] || {};
                    listado.innerHTML += `
                        <div class="ficha-registro">
                            <div class="campo"><span class="lbl">UF:</span><span class="val">${depto.UF || depto.uf || 'S/D'}</span></div>
                            <div class="campo"><span class="lbl">Prop:</span><span class="val">${depto.Propietario || '-'}</span></div>
                            <div class="campo"><span class="lbl">Inq:</span><span class="val">${depto.Inquilino || '-'}</span></div>
                            <div class="campo" style="border:none"><span class="lbl">Tarea:</span><span class="val-tarea">${rep.descripcion || rep.Tarea || 'Sin detalle'}</span></div>
                        </div>`;
                });
                document.getElementById("reparaciones-modal").classList.remove("hidden");
            };
        }

        window.login = () => {
            if(document.getElementById("pass").value === "4750") { localStorage.setItem("hub_ok", "1"); location.reload(); } else { alert("Clave Incorrecta"); }
        };
        window.abrirCartel = () => document.getElementById("logout-confirm").classList.remove("hidden");
        window.cerrarCartel = () => document.getElementById("logout-confirm").classList.add("hidden");
        window.cerrarObras = () => document.getElementById("reparaciones-modal").classList.add("hidden");
        window.confirmarSalida = () => { localStorage.removeItem("hub_ok"); location.reload(); };

        if(localStorage.getItem("hub_ok") === "1") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-hub").classList.remove("hidden");
            iniciar();
        }
    </script>
</body>
</html>
