<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consorcio Hub</title>
    <style>
        :root {
            --bg-dark: #0b0f19; /* Fondo profundo de tus capturas */
            --card-bg: #1a1f2b; /* Fondo de tarjetas */
            --primary-blue: #2563eb;
            --status-orange: #f59e0b;
            --status-red: #dc2626;
            --status-grey: #4b5563;
            --text-white: #e5e7eb;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Header Estilo App Nativa */
        .header {
            background-color: var(--primary-blue);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Buscador similar a la Captura 3 */
        .search-container {
            padding: 15px;
        }
        .search-bar {
            background-color: #111827;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 12px;
            color: white;
            width: 100%;
            box-sizing: border-box;
        }

        /* Grid de Botones Lanzadores */
        .app-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 15px;
        }

        .btn-app {
            border: none;
            border-radius: 8px;
            padding: 20px 10px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-app:active { transform: scale(0.95); }
        .blue { background-color: var(--primary-blue); }
        .orange { background-color: var(--status-orange); }
        .grey { background-color: var(--status-grey); }
        .red { background-color: var(--status-red); }

        /* Muro de Avisos / Estado Global */
        .section-title {
            padding: 10px 15px;
            font-size: 0.8rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card {
            background-color: var(--card-bg);
            margin: 0 15px 10px 15px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            overflow: hidden; /* Para el borde lateral */
            position: relative;
        }

        /* El borde lateral de color de tus capturas */
        .card::before {
            content: '';
            width: 6px;
            height: 100%;
            position: absolute;
            left: 0;
        }

        .card-content {
            padding: 15px 15px 15px 20px;
            flex-grow: 1;
        }

        .card-info { font-size: 0.8rem; color: #9ca3af; }
        .card-title { font-weight: bold; margin-bottom: 4px; display: block; }

        /* Colores de las tarjetas */
        .border-orange::before { background-color: var(--status-orange); }
        .border-blue::before { background-color: var(--primary-blue); }
        .border-red::before { background-color: var(--status-red); }

        /* Botón de Salir inferior (Como en tu Captura 1) */
        .btn-exit {
            background-color: var(--status-red);
            margin: 20px 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <span>EN LÍNEA - SEGURIDAD ACTIVA</span>
        <span>47% 🔋</span>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Buscar por Unidad o Apellido...">
    </div>

    <div class="app-grid">
        <button class="btn-app blue" onclick="abrirApp('unidades')">Gestión<br>Unidades</button>
        <button class="btn-app orange" onclick="abrirApp('reparaciones')">Reparaciones</button>
        <button class="btn-app grey" onclick="abrirApp('cocheras')">Cocheras</button>
        <button class="btn-app red" onclick="abrirApp('salon')">Eventos / SUM</button>
    </div>

    <div class="section-title">Muro de Avisos / Estado</div>

    <div class="card border-orange">
        <div class="card-content">
            <span class="card-title">Mantenimiento Urgente</span>
            <span class="card-info">Ascensor B fuera de servicio hasta las 18hs.</span>
        </div>
    </div>

    <div class="card border-blue">
        <div class="card-content">
            <span class="card-title">Reserva Salón</span>
            <span class="card-info">Hoy: UF 0005 - Cumpleaños (20:00)</span>
        </div>
    </div>

    <div class="card border-red">
        <div class="card-content">
            <span class="card-title">Cocheras</span>
            <span class="card-info">Quedan 3 lugares disponibles para visitantes.</span>
        </div>
    </div>

    <div class="btn-exit" onclick="confirmarSalida()">BORRAR TODA LA NUBE / LOGOUT</div>

    <script>
        function abrirApp(destino) {
            // Aquí pones las URLs de tus otras Web Apps
            const urls = {
                'unidades': 'unidades.html',
                'reparaciones': 'reparaciones.html',
                'cocheras': 'cocheras.html',
                'salon': 'salon.html'
            };
            window.location.href = urls[destino];
        }

        function confirmarSalida() {
            if(confirm("¿Desea cerrar el sistema de gestión de forma segura?")) {
                console.log("Sesión finalizada");
            }
        }
    </script>
</body>
</html>
