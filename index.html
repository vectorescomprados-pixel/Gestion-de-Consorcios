<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>HUB - Torre Urquiza 4750</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b141a; --card: #111b21; --primary: #2563eb;
            --success: #22c55e; --danger: #e11d48; --text: #e9edef;
            --border: #2a3942; --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        header {
            width: 100%; max-width: 500px; padding: 35px 15px;
            text-align: center; background: var(--card);
            border-bottom: 3px solid var(--primary);
            border-radius: 0 0 25px 25px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .btn-sync-hub {
            position: absolute; top: 25px; right: 20px;
            background: rgba(37, 99, 235, 0.15); color: var(--primary);
            border: 1px solid var(--primary); width: 45px; height: 45px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 100;
        }

        .console-container {
            width: 92%; max-width: 450px; margin-top: 20px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
        }
        .console-item {
            background: rgba(37, 99, 235, 0.08); border: 1px solid var(--border);
            padding: 18px 5px; border-radius: 20px; text-align: center;
        }
        .console-item i { font-size: 22px; color: var(--primary); margin-bottom: 8px; display: block; }
        .console-item b { font-size: 16px; display: block; margin-bottom: 2px; }
        .console-item span { font-size: 9px; text-transform: uppercase; font-weight: 700; opacity: 0.5; }

        .container {
            width: 92%; max-width: 450px; margin-top: 25px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
            padding-bottom: 120px;
        }

        .hub-card {
            background: var(--card); padding: 35px 10px; border-radius: 25px;
            text-align: center; text-decoration: none; color: white;
            border: 1px solid var(--border); display: flex;
            flex-direction: column; align-items: center;
        }
        .hub-card i { font-size: 35px; margin-bottom: 15px; color: var(--primary); }
        .hub-card span { font-weight: 700; font-size: 13px; letter-spacing: 0.5px; }

        .modal { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 30px; width: 85%; max-width: 340px; text-align: center; border: 1px solid var(--primary); }
        
        input { width: 100%; padding: 18px; margin: 20px 0; border-radius: 15px; border: 1px solid var(--border); background: #000; color: white; font-size: 24px; text-align: center; }
        .btn-login { width: 100%; padding: 18px; border-radius: 15px; background: var(--primary); color: white; border: none; font-weight: bold; }
        
        #btn-logout { margin-top: 30px; color: var(--danger); font-size: 12px; font-weight: bold; cursor: pointer; border: 1px solid var(--danger); padding: 12px 25px; border-radius: 15px; background: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 10px;">ACCESO PRIVADO</h2>
            <input type="password" id="pass" placeholder="••••" inputmode="numeric">
            <button class="btn-login" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <div id="main-hub" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <header>
            <div class="btn-sync-hub" onclick="location.reload(true)"><i class="fas fa-sync-alt"></i></div>
            <div style="color: var(--success); font-size: 10px; font-weight: 800;">● CONECTADO</div>
            <h1 style="font-size: 22px; font-weight: 900;">URQUIZA 4750</h1>
        </header>

        <div class="console-container">
            <div class="console-item"><i class="fas fa-car"></i><b id="stat-cocheras">--</b><span>Libres</span></div>
            <div class="console-item"><i class="fas fa-calendar-check"></i><b id="stat-sum">--</b><span>S.U.M.</span></div>
            <div class="console-item"><i class="fas fa-tools"></i><b id="stat-obras">--</b><span>Obras</span></div>
        </div>

        <div class="container">
            <a href="https://vectorescomprados-pixel.github.io/reservas_salon/" class="hub-card"><i class="fas fa-calendar-alt"></i><span>RESERVAS</span></a>
            <a href="https://vectorescomprados-pixel.github.io/Gestion-de-cocheras/" class="hub-card"><i class="fas fa-parking"></i><span>COCHERA</span></a>
            <a href="https://vectorescomprados-pixel.github.io/Gestion-Integral-de-Reparaciones/" class="hub-card"><i class="fas fa-hammer"></i><span>OBRAS</span></a>
            <a href="https://vectorescomprados-pixel.github.io/GestionUF-Comercial/" class="hub-card"><i class="fas fa-users-cog"></i><span>UNIDADES</span></a>
        </div>

        <button id="btn-logout" onclick="logout()">CERRAR SESIÓN</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function normalizarFecha(f) {
            if(!f) return 0;
            const nums = f.replace(/\D/g, ''); 
            if(f.includes('-') && f.split('-').length === 4) {
                return parseInt(nums); 
            } else {
                const d = nums.substring(0,2);
                const m = nums.substring(2,4);
                const a = "20" + nums.substring(4,6);
                return parseInt(a + m + d);
            }
        }

        function conectar() {
            // 1. Cocheras (Campos: UF e Inquilino con Mayúscula)
            onSnapshot(collection(db, "departamentos"), (snap) => {
                const libres = snap.docs.filter(d => {
                    const data = d.data();
                    return parseInt(data.UF) <= 87 && (!data.Inquilino || data.Inquilino.trim() === "");
                }).length;
                document.getElementById("stat-cocheras").innerText = libres;
            });

            // 2. SUM (Campo: fecha con minúscula según tu foto de Firebase)
            const hoyObj = new Date();
            const hoyNum = parseInt(hoyObj.getFullYear() + String(hoyObj.getMonth() + 1).padStart(2, '0') + String(hoyObj.getDate()).padStart(2, '0'));

            onSnapshot(collection(db, "reservas_salon"), (snap) => {
                let proxFecha = null;
                let minVal = 99999999;

                snap.forEach(doc => {
                    const data = doc.data();
                    const val = normalizarFecha(data.fecha);
                    if (val >= hoyNum && val < minVal) {
                        minVal = val;
                        proxFecha = data.fecha;
                    }
                });

                const el = document.getElementById("stat-sum");
                if (proxFecha) {
                    if (minVal === hoyNum) {
                        el.innerText = "HOY";
                        el.style.color = "var(--danger)";
                    } else {
                        const f = proxFecha.replace(/\D/g, '');
                        // Si es AAAA-MM-DD extraemos los números correctos
                        if(proxFecha.includes('-') && proxFecha.indexOf('-') === 4) {
                           el.innerText = proxFecha.substring(8,10) + "/" + proxFecha.substring(5,7);
                        } else {
                           el.innerText = f.substring(0,2) + "/" + f.substring(2,4);
                        }
                        el.style.color = "var(--warning)";
                    }
                } else {
                    el.innerText = "S/R";
                    el.style.color = "var(--success)";
                }
            });

            // 3. Reparaciones (Campo: estado con minúscula o Estado con Mayúscula)
            onSnapshot(collection(db, "reparaciones"), (snap) => {
                const p = snap.docs.filter(d => {
                    const data = d.data();
                    return (data.estado === "Pendiente" || data.Estado === "Pendiente");
                }).length;
                const el = document.getElementById("stat-obras");
                el.innerText = p;
                el.style.color = p > 0 ? "var(--danger)" : "var(--success)";
            });
        }

        window.login = () => {
            if (document.getElementById("pass").value === "4750") {
                localStorage.setItem("session_hub_vFinal", "active");
                location.reload();
            } else { alert("Clave Incorrecta"); }
        };

        window.logout = () => { localStorage.removeItem("session_hub_vFinal"); location.reload(); };

        if (localStorage.getItem("session_hub_vFinal") === "active") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-hub").classList.remove("hidden");
            conectar();
        }
    </script>
</body>
</html>
