<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>HUB - Torre Urquiza 4750</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b141a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b141a; --card: #111b21; --primary: #2563eb;
            --success: #22c55e; --danger: #e11d48; --text: #e9edef;
            --border: #2a3942; --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        header {
            width: 100%; max-width: 500px; padding: 30px 15px;
            text-align: center; background: var(--card);
            border-bottom: 3px solid var(--primary);
            border-radius: 0 0 20px 20px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        #status-tag { color: var(--success); font-size: 10px; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }

        .console-container {
            width: 92%; max-width: 450px; margin-top: 20px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
        }
        .console-item {
            background: rgba(37, 99, 235, 0.08); border: 1px solid var(--border);
            padding: 18px 5px; border-radius: 20px; text-align: center;
        }
        .console-item i { font-size: 22px; color: var(--primary); margin-bottom: 8px; display: block; }
        .console-item b { font-size: 16px; display: block; margin-bottom: 2px; }
        .console-item span { font-size: 9px; text-transform: uppercase; font-weight: 700; opacity: 0.5; }

        .container {
            width: 92%; max-width: 450px; margin-top: 25px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            padding-bottom: 120px;
        }

        .hub-card {
            background: var(--card); padding: 35px 10px; border-radius: 25px;
            text-align: center; text-decoration: none; color: white;
            border: 1px solid var(--border); display: flex;
            flex-direction: column; align-items: center; transition: 0.2s;
        }
        .hub-card i { font-size: 35px; margin-bottom: 15px; color: var(--primary); }
        .hub-card span { font-weight: 700; font-size: 13px; letter-spacing: 0.5px; }
        .hub-card:active { transform: scale(0.95); background: #1a252c; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 25px; width: 85%; max-width: 340px; text-align: center; border: 1px solid var(--primary); }
        
        input { width: 100%; padding: 16px; margin: 20px 0; border-radius: 12px; border: 1px solid var(--border); background: #000; color: white; font-size: 22px; text-align: center; outline: none; }
        .btn-login { width: 100%; padding: 16px; border-radius: 12px; background: var(--primary); color: white; border: none; font-weight: bold; }
        
        .hidden { display: none !important; }
        #btn-logout { margin-top: 30px; color: var(--danger); font-size: 13px; font-weight: bold; cursor: pointer; background: none; border: 1px solid var(--danger); padding: 10px 20px; border-radius: 12px; }
    </style>
</head>
<body>

    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="letter-spacing: 1px;">SISTEMA HUB</h2>
            <input type="password" id="pass" placeholder="••••" inputmode="numeric">
            <button class="btn-login" onclick="login()">INGRESAR</button>
        </div>
    </div>

    <div id="main-hub" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <header>
            <div id="status-tag">● Conectado</div>
            <h1 style="font-size: 22px; font-weight: 800;">URQUIZA 4750</h1>
        </header>

        <div class="console-container">
            <div class="console-item"><i class="fas fa-car"></i><b id="stat-cocheras">--</b><span>Libres</span></div>
            <div class="console-item"><i class="fas fa-calendar-alt"></i><b id="stat-sum">--</b><span>S.U.M.</span></div>
            <div class="console-item"><i class="fas fa-tools"></i><b id="stat-obras">--</b><span>Obras</span></div>
        </div>

        <div class="container">
            <a href="https://vectorescomprados-pixel.github.io/reservas_salon/" class="hub-card"><i class="fas fa-calendar-check"></i><span>RESERVAS</span></a>
            <a href="https://vectorescomprados-pixel.github.io/Gestion-de-cocheras/" class="hub-card"><i class="fas fa-parking"></i><span>COCHERA</span></a>
            <a href="https://vectorescomprados-pixel.github.io/Gestion-Integral-de-Reparaciones/" class="hub-card"><i class="fas fa-hammer"></i><span>REPARACIONES</span></a>
            <a href="https://vectorescomprados-pixel.github.io/GestionUF-Comercial/" class="hub-card"><i class="fas fa-users-cog"></i><span>UNIDADES</span></a>
        </div>

        <button id="btn-logout" onclick="logout()">CERRAR SESIÓN</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function iniciar() {
            // 1. Cocheras
            onSnapshot(collection(db, "departamentos"), (snap) => {
                const libres = snap.docs.filter(d => parseInt(d.data().UF) <= 87 && (!d.data().Inquilino || d.data().Inquilino.trim() === "")).length;
                document.getElementById("stat-cocheras").innerText = libres;
            });

            // 2. SUM (Lógica Local para evitar fallos de índice)
            const hoy = new Date().toISOString().split('T');
            onSnapshot(collection(db, "reservas_salon"), (snap) => {
                const data = snap.docs.map(d => d.data());
                // Filtramos fechas futuras y ordenamos
                const futuras = data.filter(r => r.fecha >= hoy).sort((a,b) => a.fecha.localeCompare(b.fecha));
                
                const el = document.getElementById("stat-sum");
                if (futuras.length > 0) {
                    const prox = futuras;
                    el.innerText = prox.fecha === hoy ? "HOY" : prox.fecha.split('-').reverse().slice(0,2).join('/');
                    el.style.color = prox.fecha === hoy ? "var(--danger)" : "var(--warning)";
                } else {
                    el.innerText = "S/R";
                    el.style.color = "var(--success)";
                }
            });

            // 3. Reparaciones
            onSnapshot(query(collection(db, "reparaciones"), where("estado", "==", "Pendiente")), (snap) => {
                const p = snap.size;
                const el = document.getElementById("stat-obras");
                el.innerText = p;
                el.style.color = p > 0 ? "var(--danger)" : "var(--success)";
            });
        }

        window.login = () => {
            if (document.getElementById("pass").value === "4750") {
                localStorage.setItem("session_v6", "active");
                location.reload();
            } else { alert("Error"); }
        };

        window.logout = () => { localStorage.removeItem("session_v6"); location.reload(); };

        if (localStorage.getItem("session_v6") === "active") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-hub").classList.remove("hidden");
            iniciar();
        }
    </script>
</body>
</html>
