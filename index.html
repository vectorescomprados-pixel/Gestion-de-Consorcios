<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HUB - Gestión de Consorcios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b141a;
            --card: #111b21;
            --primary: #2563eb;
            --success: #22c55e;
            --danger: #e11d48;
            --text: #e9edef;
            --border: #2a3942;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 🏠 BOTÓN CASITA (Estética Blindada) */
        .btn-home {
            position: fixed; top: 15px; left: 15px; z-index: 9999;
            background: rgba(37, 99, 235, 0.9); color: white;
            border-radius: 50%; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        header {
            width: 100%; max-width: 500px; padding: 25px 15px;
            text-align: center; background: var(--card);
            border-bottom: 3px solid var(--primary);
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        /* LEYENDA SEGURIDAD VERDE FUERTE */
        #status-bar {
            color: var(--success);
            font-size: 11px; font-weight: 800;
            margin-bottom: 10px; letter-spacing: 1.5px;
            text-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
        }

        /* CONTENEDOR DE BOTONES - CORREGIDO */
        .container {
            width: 95%; max-width: 450px;
            margin-top: 25px; display: grid;
            grid-template-columns: 1fr 1fr; gap: 15px;
            padding: 0 10px 120px 10px;
        }

        .hub-card {
            background: var(--card); padding: 30px 10px;
            border-radius: 18px; text-align: center;
            text-decoration: none; color: white;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
            display: flex; flex-direction: column; align-items: center;
        }
        .hub-card:active { transform: scale(0.95); background: #1a252c; border-color: var(--primary); }
        .hub-card i { font-size: 35px; margin-bottom: 12px; color: var(--primary); }
        .hub-card span { display: block; font-weight: bold; font-size: 13px; text-transform: uppercase; }

        /* MODALES BLINDADOS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
        .modal-content { 
            background: var(--card); padding: 35px 25px; border-radius: 24px; 
            width: 100%; max-width: 360px; text-align: center; 
            border: 1px solid var(--primary); box-shadow: 0 0 30px rgba(37, 99, 235, 0.2);
        }
        
        input { 
            width: 100%; padding: 14px 15px; margin: 10px 0; 
            border-radius: 12px; border: 1px solid var(--border); 
            background: #0b141a; color: white; font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--primary); }
        
        .btn { 
            padding: 15px; width: 100%; border-radius: 12px; 
            border: none; font-weight: bold; cursor: pointer; 
            font-size: 14px; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary { background: var(--primary); color: white; margin-top: 15px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-ghost { background: #2a3942; color: #e9edef; }

        .hidden { display: none !important; }

        #btn-logout-main {
            position: fixed; bottom: 30px; width: calc(100% - 40px); max-width: 400px;
            background: rgba(17, 27, 33, 0.95); color: var(--danger); font-weight: bold;
            padding: 16px; border-radius: 16px; border: 1px solid var(--danger); 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-home"><i class="fas fa-home"></i></a>

    <div id="login-screen" class="modal">
        <div class="modal-content">
            <i class="fas fa-fingerprint" style="font-size: 50px; color: var(--primary); margin-bottom: 20px;"></i>
            <h2 style="margin-bottom: 5px;">Sistema Carga 87</h2>
            <p style="font-size: 12px; opacity: 0.5; margin-bottom: 25px;">CONTROL DE ACCESO RESTRINGIDO</p>
            
            <input type="password" id="pass" placeholder="Clave de Seguridad" inputmode="numeric">
            
            <button class="btn btn-primary" onclick="login()">VALIDAR ACCESO</button>
        </div>
    </div>

    <div id="main-hub" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <header>
            <div id="status-bar">● CONEXIÓN SEGURA - SEGURIDAD ACTIVA</div>
            <h1 style="font-size: 26px; letter-spacing: -1px;">HUB CENTRAL</h1>
            <p style="font-size: 13px; opacity: 0.5;">Administración de Consorcio</p>
        </header>

        <div class="container">
            <a href="https://vectorescomprados-pixel.github.io/Gestion-de-Consorcios/salon/" class="hub-card">
                <i class="fas fa-calendar-check"></i>
                <span>SALÓN SUM</span>
            </a>
            <a href="https://vectorescomprados-pixel.github.io/Gestion-de-Consorcios/cocheras/" class="hub-card">
                <i class="fas fa-car"></i>
                <span>COCHERAS</span>
            </a>
            <a href="https://vectorescomprados-pixel.github.io/Gestion-de-Consorcios/reparaciones/" class="hub-card">
                <i class="fas fa-tools"></i>
                <span>REPARACIONES</span>
            </a>
            <a href="https://vectorescomprados-pixel.github.io/Gestion-de-Consorcios/gestionuf/" class="hub-card">
                <i class="fas fa-users-cog"></i>
                <span>GESTIÓN UF</span>
            </a>
        </div>

        <button id="btn-logout-main" onclick="abrirCartelSalida()">
            <i class="fas fa-power-off"></i> FINALIZAR SESIÓN SEGURA
        </button>
    </div>

    <div id="modal-logout" class="modal hidden">
        <div class="modal-content">
            <div style="background: rgba(225, 29, 72, 0.1); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i class="fas fa-sign-out-alt" style="font-size: 40px; color: var(--danger);"></i>
            </div>
            <h3 style="font-size: 22px; margin-bottom: 10px;">Finalizar Sesión</h3>
            <p style="margin-bottom: 30px; font-size: 15px; opacity: 0.8; line-height: 1.5;">¿Desea cerrar el sistema de gestión de forma segura?</p>
            
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-danger" style="flex: 1;" onclick="confirmarSalida()">SALIR</button>
                <button class="btn btn-ghost" style="flex: 1;" onclick="cerrarCartelSalida()">VOLVER</button>
            </div>
        </div>
    </div>

    <script>
        // Credencial Maestra: 1131552679
        const KEY = "1131552679";

        function login() {
            const p = document.getElementById("pass").value;
            if (p === KEY) {
                localStorage.setItem("session_hub_2026", "active");
                mostrarHub();
            } else {
                alert("Clave Incorrecta");
                document.getElementById("pass").value = "";
            }
        }

        function mostrarHub() {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-hub").classList.remove("hidden");
        }

        if (localStorage.getItem("session_hub_2026") === "active") {
            mostrarHub();
        }

        function abrirCartelSalida() { document.getElementById("modal-logout").classList.remove("hidden"); }
        function cerrarCartelSalida() { document.getElementById("modal-logout").classList.add("hidden"); }
        
        function confirmarSalida() {
            localStorage.removeItem("session_hub_2026");
            location.reload();
        }

        // Bloquear Enter para login
        document.getElementById("pass").addEventListener("keypress", (e) => {
            if (e.key === "Enter") login();
        });
    </script>
</body>
</html>
